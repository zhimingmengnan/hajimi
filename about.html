<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>術師档案 - 呪術廻戦</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --jujutsu-black: #0a0a0a;
            --jujutsu-dark: #1a1a2e;
            --jujutsu-purple: #9d4edd;
            --jujutsu-blue: #00d9ff;
            --jujutsu-red: #ff006e;
            --jujutsu-gold: #ffd700;
        }
        
        * { font-family: 'Noto Sans JP', sans-serif; }
        
        body {
            background: var(--jujutsu-black);
            color: #fff;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 80% 20%, rgba(255, 0, 110, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(0, 217, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        
        .curse-mark {
            position: fixed;
            font-size: 20rem;
            opacity: 0.03;
            color: var(--jujutsu-red);
            pointer-events: none;
            z-index: -1;
        }
        
        .curse-mark:nth-child(1) { top: -10%; right: -10%; }
        .curse-mark:nth-child(2) { bottom: -10%; left: -10%; transform: rotate(180deg); }
        
        .navbar {
            background: linear-gradient(180deg, rgba(10,10,10,0.95) 0%, rgba(26,26,46,0.9) 100%) !important;
            border-bottom: 2px solid var(--jujutsu-purple);
            box-shadow: 0 0 30px rgba(157, 78, 221, 0.4);
            padding: 1rem 0;
        }
        
        .navbar-brand {
            font-weight: 900;
            font-size: 1.8rem;
            color: var(--jujutsu-gold) !important;
            text-shadow: 0 0 20px var(--jujutsu-gold);
            letter-spacing: 3px;
        }
        
        .navbar-brand::before { content: '◈ '; color: var(--jujutsu-red); }
        
        .nav-link {
            color: #fff !important;
            font-weight: 700;
            margin: 0 0.3rem;
            padding: 0.6rem 1.2rem !important;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .nav-link:hover {
            border-color: var(--jujutsu-purple);
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.5);
            color: var(--jujutsu-blue) !important;
        }
        
        .nav-item.active .nav-link {
            background: linear-gradient(135deg, var(--jujutsu-purple), var(--jujutsu-blue));
            border-color: var(--jujutsu-gold);
            box-shadow: 0 0 25px rgba(157, 78, 221, 0.6);
        }
        
        .nav-item.active .nav-link::after { content: ' ◆'; color: var(--jujutsu-gold); }
        
        .navbar-toggler {
            border: 2px solid var(--jujutsu-purple);
            background: rgba(157, 78, 221, 0.2);
        }
        
        .sorcerer-profile {
            position: relative;
            padding: 5rem 0;
            background: linear-gradient(180deg, rgba(255,0,110,0.1) 0%, transparent 100%);
        }
        
        .sorcerer-title {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--jujutsu-red);
            text-shadow: 0 0 30px var(--jujutsu-red);
        }
        
        .grade-special {
            display: inline-block;
            padding: 0.5rem 2rem;
            background: linear-gradient(135deg, var(--jujutsu-red), var(--jujutsu-purple));
            border: 2px solid var(--jujutsu-gold);
            border-radius: 5px;
            font-weight: 900;
            font-size: 1.2rem;
            color: #fff;
            box-shadow: 0 0 30px rgba(255, 0, 110, 0.5);
            transform: rotate(-2deg);
        }
        
        .technique-card {
            background: linear-gradient(145deg, rgba(26,26,46,0.9), rgba(10,10,10,0.9));
            border: 2px solid var(--jujutsu-purple);
            border-radius: 15px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 40px rgba(157, 78, 221, 0.2);
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 1rem;
            margin: 0.5rem 0;
            background: rgba(0,0,0,0.3);
            border-left: 4px solid var(--jujutsu-red);
            border-radius: 0 8px 8px 0;
        }
        
        .stat-label { color: #888; }
        .stat-value { 
            color: var(--jujutsu-gold);
            font-weight: 700;
            font-size: 1.1rem;
        }
        
        .seal-footer {
            margin-top: 4rem;
            padding: 3rem 0;
            text-align: center;
            border-top: 2px solid var(--jujutsu-red);
            background: linear-gradient(180deg, transparent, rgba(255, 0, 110, 0.1));
        }
    </style>
</head>
<body>

    <div class="curse-mark">術</div>
    <div class="curse-mark">師</div>

    <nav class="navbar navbar-expand-sm navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">JUJUTSU KAISEN</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon" style="background-image: url(&quot;data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='%239d4edd' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e&quot;);"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">領域</a></li>          
                    <li class="nav-item active"><a class="nav-link" href="about.html">術師</a></li>
                    <li class="nav-item"><a class="nav-link" href="skill.html">術式</a></li>
                    <li class="nav-item"><a class="nav-link" href="work.html">任務</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="sorcerer-profile">
        <div class="container text-center">
            <h1 class="sorcerer-title">術師档案</h1>
            <div class="mt-3">
                <span class="grade-special">特級 · 呪術師</span>
            </div>
            <p class="mt-3" style="color: var(--jujutsu-blue); letter-spacing: 3px;">TOKYU JUTSUSHI</p>
        </div>
    </section>

    <div class="container">
        <div class="technique-card">
            <h2 style="color: var(--jujutsu-red); border-bottom: 2px solid var(--jujutsu-red); padding-bottom: 1rem;">
                📋 基本情報
            </h2>
            <div class="mt-4">
                <div class="stat-row">
                    <span class="stat-label">名前 / Name</span>
                    <span class="stat-value">五条 悟</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">等級 / Grade</span>
                    <span class="stat-value" style="color: var(--jujutsu-red);">特級</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">術式 / Technique</span>
                    <span class="stat-value" style="color: var(--jujutsu-blue);">無下限呪術</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">領域 / Domain</span>
                    <span class="stat-value" style="color: var(--jujutsu-purple);">無量空処</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">戦力 / Power</span>
                    <span class="stat-value">∞ 无限</span>
                </div>
            </div>
        </div>

        <div class="technique-card">
            <h2 style="color: var(--jujutsu-gold); border-bottom: 2px solid var(--jujutsu-gold); padding-bottom: 1rem;">
                👁️ 術式詳細
            </h2>
            <p style="color: #ccc; line-height: 1.8;">
                拥有"六眼"的术师，能够完美操控无下限咒术。领域展开"无量空处"可以将无限的信息灌入对手大脑，使其陷入昏迷状态。
                <br><br>
                <span style="color: var(--jujutsu-blue);">「天上天下，唯我独尊」</span>
            </p>
        </div>
    </div>

    <footer class="seal-footer">
        <div style="color: var(--jujutsu-red); font-size: 2rem; letter-spacing: 10px; opacity: 0.5;">◈ ◆ ◈ ◆ ◈</div>
        <p class="mt-3 text-muted">呪術廻戦 · 術師档案</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
